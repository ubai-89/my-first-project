<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Modern Glass UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #87ceeb 0%, #4da6d6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background elements */
        .bg-blur {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(135deg, #87ceeb 0%, #4da6d6 50%, #1e90ff 100%);
            animation: drift 20s infinite;
            z-index: -1;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 50px); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 50px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #fff;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .logo p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="email"]::placeholder,
        input[type="password"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .remember-forgot a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .remember-forgot a:hover {
            color: #fff;
        }

        .checkbox {
            accent-color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #4da6d6 0%, #1e90ff 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(77, 166, 214, 0.4);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(77, 166, 214, 0.6);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .signup-link a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .signup-link a:hover {
            color: #e0e7ff;
        }

        @media (max-width: 480px) {
            .glass-card {
                padding: 40px 30px;
                max-width: 90%;
            }

            .logo h1 {
                font-size: 24px;
            }
        }

        .profile-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(77, 166, 214, 0.3);
        }

        .side-image {
            position: absolute;
            width: 200px;
            height: 200px;
            opacity: 0.3;
            object-fit: contain;
        }

        .side-image-left {
            left: 20px;
            top: 50px;
        }

        .side-image-right {
            right: 20px;
            bottom: 50px;
        }
    </style>
</head>
<body>
    <div class="bg-blur"></div>
    
    <!-- Decorative side images -->
    <svg class="side-image side-image-left" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="80" fill="rgba(255, 255, 255, 0.1)" stroke="rgba(255, 255, 255, 0.2)" stroke-width="2"/>
        <circle cx="60" cy="60" r="30" fill="rgba(255, 255, 255, 0.15)"/>
        <path d="M 100 40 Q 140 60 140 100" stroke="rgba(255, 255, 255, 0.2)" stroke-width="2" fill="none"/>
    </svg>

    <svg class="side-image side-image-right" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="20" width="160" height="160" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="2" rx="20"/>
        <circle cx="100" cy="80" r="25" fill="rgba(255, 255, 255, 0.15)"/>
        <line x1="60" y1="130" x2="140" y2="130" stroke="rgba(255, 255, 255, 0.2)" stroke-width="2"/>
    </svg>
    
    <div class="glass-card">
        <div class="logo">
            <!-- Profile picture placeholder -->
            <svg class="profile-img" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                <circle cx="40" cy="40" r="40" fill="rgba(77, 166, 214, 0.3)" stroke="rgba(255, 255, 255, 0.3)" stroke-width="2"/>
                <circle cx="40" cy="30" r="12" fill="rgba(255, 255, 255, 0.6)"/>
                <path d="M 20 55 Q 40 45 60 55" fill="rgba(255, 255, 255, 0.5)"/>
            </svg>
            <h1>Welcome Back</h1>
            <p>Sign in to your account</p>
        </div>

        <form>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="remember-forgot">
                <label style="display: flex; align-items: center; margin: 0; cursor: pointer;">
                    <input type="checkbox" class="checkbox" style="margin-right: 8px;">
                    Remember me
                </label>
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="signup-link">
            Don't have an account? <a href="register.html">Sign Up</a>
        </div>
    </div>
</body>
</html>
